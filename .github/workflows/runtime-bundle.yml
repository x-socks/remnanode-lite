name: Runtime Bundle

permissions:
  contents: write

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      image_ref:
        description: Docker image to export
        required: true
        default: remnawave/node:latest
        type: string
      app_root:
        description: Optional app root inside the image
        required: false
        default: ""
        type: string
      include_paths:
        description: Optional override for exported paths
        required: false
        default: ""
        type: string
      publish_release:
        description: Publish the runtime bundle as a GitHub release
        required: true
        default: true
        type: boolean
      deploy_host:
        description: Copy the runtime bundle to an already-bootstrapped Alpine host
        required: true
        default: false
        type: boolean
      base_dir:
        description: Remote installation base directory
        required: true
        default: /opt/remnanode
        type: string
      restart_service:
        description: Restart remnanode after remote install
        required: true
        default: false
        type: boolean

jobs:
  bundle:
    runs-on: ubuntu-latest
    outputs:
      bundle_stamp: ${{ steps.vars.outputs.bundle_stamp }}
      runtime_bundle: ${{ steps.export.outputs.runtime_bundle }}
      runtime_bundle_latest: ${{ steps.aliases.outputs.runtime_bundle_latest }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      should_export: ${{ steps.check.outputs.should_export }}
      image_ref: ${{ steps.settings.outputs.image_ref }}
      image_digest: ${{ steps.image.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare metadata
        id: vars
        run: |
          set -eu
          short_sha=$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)
          bundle_stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${short_sha}"
          release_tag="runtime-${bundle_stamp}"
          echo "bundle_stamp=${bundle_stamp}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Resolve workflow settings
        id: settings
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_ref="${{ inputs.image_ref }}"
            app_root="${{ inputs.app_root }}"
            include_paths="${{ inputs.include_paths }}"
            publish_release="${{ inputs.publish_release }}"
            monitor_only="false"
          else
            image_ref="remnawave/node:latest"
            app_root=""
            include_paths=""
            publish_release="true"
            monitor_only="true"
          fi
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "app_root=${app_root}" >> "${GITHUB_OUTPUT}"
          echo "include_paths=${include_paths}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"
          echo "monitor_only=${monitor_only}" >> "${GITHUB_OUTPUT}"

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Pull upstream image
        run: docker pull "${{ steps.settings.outputs.image_ref }}"

      - name: Resolve upstream image digest
        id: image
        run: |
          set -eu
          repo_digest=$(docker image inspect --format '{{join .RepoDigests "\n"}}' "${{ steps.settings.outputs.image_ref }}" | head -n 1)
          if [ -z "${repo_digest}" ]; then
            echo "unable to resolve upstream repo digest" >&2
            exit 1
          fi
          image_digest="${repo_digest#*@}"
          echo "repo_digest=${repo_digest}" >> "${GITHUB_OUTPUT}"
          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"

      - name: Check whether upstream runtime changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          latest_body=""
          if gh api "repos/${GITHUB_REPOSITORY}/releases/latest" >/tmp/remnanode-latest-release.json 2>/dev/null; then
            latest_body=$(python3 -c "import json; print(json.load(open('/tmp/remnanode-latest-release.json', 'r', encoding='utf-8')).get('body', ''))")
          fi

          previous_digest=$(printf '%s\n' "${latest_body}" | sed -n 's/^image_digest=//p' | head -n 1)

          if [ "${{ steps.settings.outputs.monitor_only }}" = "true" ] && [ -n "${previous_digest}" ] && [ "${previous_digest}" = "${{ steps.image.outputs.image_digest }}" ]; then
            echo "should_export=false" >> "${GITHUB_OUTPUT}"
            echo "upstream digest unchanged: ${previous_digest}"
          else
            echo "should_export=true" >> "${GITHUB_OUTPUT}"
            if [ -n "${previous_digest}" ]; then
              echo "upstream digest changed: ${previous_digest} -> ${{ steps.image.outputs.image_digest }}"
            else
              echo "no previous runtime release digest found; export required"
            fi
          fi

      - name: Export runtime bundle
        if: ${{ steps.check.outputs.should_export == 'true' }}
        id: export
        env:
          APP_ROOT: ${{ steps.settings.outputs.app_root }}
          INCLUDE_PATHS: ${{ steps.settings.outputs.include_paths }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          BUNDLE_STAMP: ${{ steps.vars.outputs.bundle_stamp }}
          BUNDLE_PATH_FILE: ${{ runner.temp }}/runtime-bundle-path.txt
        run: |
          set -eu
          ./scripts/export-runtime-bundle.sh "${{ steps.settings.outputs.image_ref }}" ./out
          runtime_bundle=$(cat "${RUNNER_TEMP}/runtime-bundle-path.txt")
          echo "runtime_bundle=${runtime_bundle}" >> "${GITHUB_OUTPUT}"

      - name: Prepare stable release asset names
        if: ${{ steps.check.outputs.should_export == 'true' }}
        id: aliases
        run: |
          set -eu
          runtime_bundle_latest=./out/remnanode-runtime-latest.tar.gz
          cp "${{ steps.export.outputs.runtime_bundle }}" "${runtime_bundle_latest}"
          echo "runtime_bundle_latest=${runtime_bundle_latest}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        if: ${{ steps.check.outputs.should_export == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: remnanode-bundles-${{ steps.vars.outputs.bundle_stamp }}
          path: |
            ${{ steps.export.outputs.runtime_bundle }}
            ${{ steps.aliases.outputs.runtime_bundle_latest }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ steps.check.outputs.should_export == 'true' && steps.settings.outputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          release_notes="Runtime bundle exported from ${{ steps.settings.outputs.image_ref }}
          image_digest=${{ steps.image.outputs.image_digest }}"
          gh release create "${{ steps.vars.outputs.release_tag }}" \
            "${{ steps.export.outputs.runtime_bundle }}" \
            "${{ steps.aliases.outputs.runtime_bundle_latest }}" \
            --title "${{ steps.vars.outputs.release_tag }}" \
            --notes "${release_notes}"

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_host && needs.bundle.outputs.should_export == 'true' }}
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: remnanode-bundles-${{ needs.bundle.outputs.bundle_stamp }}
          path: ./artifacts

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu
          : "${DEPLOY_HOST:?missing DEPLOY_HOST secret}"
          : "${DEPLOY_USER:?missing DEPLOY_USER secret}"
          : "${DEPLOY_SSH_KEY:?missing DEPLOY_SSH_KEY secret}"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          if [ -n "${DEPLOY_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          else
            port="${DEPLOY_PORT:-22}"
            ssh-keyscan -p "${port}" "${DEPLOY_HOST}" > "${HOME}/.ssh/known_hosts"
          fi

      - name: Copy bundles to remote host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -eu
          port="${DEPLOY_PORT:-22}"
          remote_dir="/root/.remnanode-work/ci-${{ needs.bundle.outputs.bundle_stamp }}"
          ssh -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${remote_dir}'"
          scp -P "${port}" ./artifacts/* "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_dir}/"

      - name: Update remote host runtime
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -eu
          port="${DEPLOY_PORT:-22}"
          remote_dir="/root/.remnanode-work/ci-${{ needs.bundle.outputs.bundle_stamp }}"
          ssh -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -eu
            cd '${remote_dir}'
            runtime_bundle=\$(find . -maxdepth 1 -name 'remnanode-runtime-*.tar.gz' | head -n 1)
            [ -n \"\${runtime_bundle}\" ]
            if [ ! -x /usr/local/bin/install-remnanode-runtime ]; then
              echo 'remote host is not bootstrapped; run the one-click installer first' >&2
              exit 1
            fi
            /usr/local/bin/install-remnanode-runtime \"${remote_dir}/\${runtime_bundle#./}\" '${{ inputs.base_dir }}'
            /usr/local/bin/check-remnanode-layout '${{ inputs.base_dir }}/current'
            if [ '${{ inputs.restart_service }}' = 'true' ]; then
              rc-service remnanode restart
            fi
          "
