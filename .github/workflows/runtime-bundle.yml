name: Runtime Bundle

permissions:
  contents: write

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      image_ref:
        description: Docker image to export
        required: true
        default: remnawave/node:latest
        type: string
      app_root:
        description: Optional app root inside the image
        required: false
        default: ""
        type: string
      include_paths:
        description: Optional override for exported paths
        required: false
        default: ""
        type: string
      publish_release:
        description: Publish the runtime bundle as a GitHub release
        required: true
        default: true
        type: boolean

jobs:
  bundle:
    runs-on: ubuntu-latest
    outputs:
      bundle_stamp: ${{ steps.vars.outputs.bundle_stamp }}
      runtime_bundle: ${{ steps.export.outputs.runtime_bundle }}
      runtime_bundle_latest: ${{ steps.aliases.outputs.runtime_bundle_latest }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      should_export: ${{ steps.check.outputs.should_export }}
      image_ref: ${{ steps.settings.outputs.image_ref }}
      image_digest: ${{ steps.image.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare metadata
        id: vars
        run: |
          set -eu
          short_sha=$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)
          bundle_stamp="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${short_sha}"
          release_tag="runtime-${bundle_stamp}"
          echo "bundle_stamp=${bundle_stamp}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Resolve workflow settings
        id: settings
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_ref="${{ inputs.image_ref }}"
            app_root="${{ inputs.app_root }}"
            include_paths="${{ inputs.include_paths }}"
            publish_release="${{ inputs.publish_release }}"
            monitor_only="false"
          else
            image_ref="remnawave/node:latest"
            app_root=""
            include_paths=""
            publish_release="true"
            monitor_only="true"
          fi
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "app_root=${app_root}" >> "${GITHUB_OUTPUT}"
          echo "include_paths=${include_paths}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"
          echo "monitor_only=${monitor_only}" >> "${GITHUB_OUTPUT}"

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Pull upstream image
        run: docker pull "${{ steps.settings.outputs.image_ref }}"

      - name: Resolve upstream image digest
        id: image
        run: |
          set -eu
          repo_digest=$(docker image inspect --format '{{join .RepoDigests "\n"}}' "${{ steps.settings.outputs.image_ref }}" | head -n 1)
          if [ -z "${repo_digest}" ]; then
            echo "unable to resolve upstream repo digest" >&2
            exit 1
          fi
          image_digest="${repo_digest#*@}"
          echo "repo_digest=${repo_digest}" >> "${GITHUB_OUTPUT}"
          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"

      - name: Check whether upstream runtime changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          latest_body=""
          latest_release_json="${RUNNER_TEMP}/latest-release.json"
          if gh api "repos/${GITHUB_REPOSITORY}/releases/latest" > "${latest_release_json}" 2>/dev/null; then
            latest_body=$(python3 -c "import json; print(json.load(open('${latest_release_json}', 'r', encoding='utf-8')).get('body', ''))")
          fi

          previous_digest=$(printf '%s\n' "${latest_body}" | sed -n 's/^image_digest=//p' | head -n 1)

          if [ "${{ steps.settings.outputs.monitor_only }}" = "true" ] && [ -n "${previous_digest}" ] && [ "${previous_digest}" = "${{ steps.image.outputs.image_digest }}" ]; then
            echo "should_export=false" >> "${GITHUB_OUTPUT}"
            echo "upstream digest unchanged: ${previous_digest}"
          else
            echo "should_export=true" >> "${GITHUB_OUTPUT}"
            if [ -n "${previous_digest}" ]; then
              echo "upstream digest changed: ${previous_digest} -> ${{ steps.image.outputs.image_digest }}"
            else
              echo "no previous runtime release digest found; export required"
            fi
          fi

      - name: Export runtime bundle
        if: ${{ steps.check.outputs.should_export == 'true' }}
        id: export
        env:
          APP_ROOT: ${{ steps.settings.outputs.app_root }}
          INCLUDE_PATHS: ${{ steps.settings.outputs.include_paths }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          BUNDLE_STAMP: ${{ steps.vars.outputs.bundle_stamp }}
          BUNDLE_PATH_FILE: ${{ runner.temp }}/runtime-bundle-path.txt
        run: |
          set -eu
          ./scripts/export-runtime-bundle.sh "${{ steps.settings.outputs.image_ref }}" ./out
          runtime_bundle=$(cat "${RUNNER_TEMP}/runtime-bundle-path.txt")
          echo "runtime_bundle=${runtime_bundle}" >> "${GITHUB_OUTPUT}"

      - name: Prepare stable release asset name
        if: ${{ steps.check.outputs.should_export == 'true' }}
        id: aliases
        run: |
          set -eu
          runtime_bundle_latest=./out/remnanode-runtime-latest.tar.gz
          cp "${{ steps.export.outputs.runtime_bundle }}" "${runtime_bundle_latest}"
          echo "runtime_bundle_latest=${runtime_bundle_latest}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        if: ${{ steps.check.outputs.should_export == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: remnanode-bundles-${{ steps.vars.outputs.bundle_stamp }}
          path: |
            ${{ steps.export.outputs.runtime_bundle }}
            ${{ steps.aliases.outputs.runtime_bundle_latest }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ steps.check.outputs.should_export == 'true' && steps.settings.outputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          release_notes="Runtime bundle exported from ${{ steps.settings.outputs.image_ref }}
          image_digest=${{ steps.image.outputs.image_digest }}"
          gh release create "${{ steps.vars.outputs.release_tag }}" \
            "${{ steps.export.outputs.runtime_bundle }}" \
            "${{ steps.aliases.outputs.runtime_bundle_latest }}" \
            --title "${{ steps.vars.outputs.release_tag }}" \
            --notes "${release_notes}"
